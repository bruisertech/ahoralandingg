<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oops... coming soon</title>
    <!-- Google Fonts: Fredoka -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@600;700&display=swap" rel="stylesheet">
    <!-- CSS -->
    <link rel="stylesheet" href="styles.css">
    <!-- GSAP & ScrollTrigger -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
</head>
<body>
    <!-- Capa 1: Fondo (manejado en CSS vía body / background) -->

    <!-- Nuevo Logo Fijo (z-index: 5) -->
    <img src="./logo.png" alt="Logo" class="logo-fixed">

    <!-- Capa 2: Contenido Central -->
    <div class="content-container">
        <h1 id="animated-text">Oops, looks like you arrived early, ahora is coming very soon</h1>
    </div>

    <!-- Capa 3: Canvas / Secuencia -->
    <canvas id="sequence-canvas"></canvas>

    <!-- Capa 4: Hint de Scroll -->
    <img src="./finger.png" alt="Scroll down" class="scroll-hint" id="scroll-hint">

    <!-- Script principal -->
    <script src="script.js"></script>
</body>
</html>
